# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/shopease
spring.datasource.username=root
spring.datasource.password=neha

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# App name
spring.application.name=shopease-backend

# Server port
server.port=8080

# JWT Secret
jwt.secret=shopease_secret_key_2024_very_long_secret
jwt.expiration=86400000

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:5174